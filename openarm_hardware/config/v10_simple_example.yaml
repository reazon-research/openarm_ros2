# Example configuration for OpenArm V10 Simple Hardware Interface
# This demonstrates how to use the simplified hardware interface

openarm_v10:
  ros__parameters:
    # Hardware interface configuration
    hardware:
      plugin: "openarm_hardware/OpenArmV10HW"
      # CAN interface (default: can0)
      can_interface: "can0"
      # Enable gripper (default: true for V10)
      enable_gripper: true

    # Joint names (7 arm joints + optional gripper)
    joints:
      - "openarm_joint1"
      - "openarm_joint2"
      - "openarm_joint3"
      - "openarm_joint4"
      - "openarm_joint5"
      - "openarm_joint6"
      - "openarm_joint7"

    command_interfaces:
      - position
      - velocity
      - effort

    # State interfaces
    state_interfaces:
      - position
      - velocity
      - effort
