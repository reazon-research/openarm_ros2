# Hardware configuration for OpenArm v10 (bimanual)

hardware_config:
  arm_type: "v10"
  dof: 7

  # CAN interface configuration
  left_arm:
    can_interface: "can1"
    use_canfd: false

    # Motor configuration
    motor_types: "DM8009,DM8009,DM4340,DM4340,DM4310,DM4310,DM4310"
    send_can_ids: "0x01,0x02,0x03,0x04,0x05,0x06,0x07"
    recv_can_ids: "0x11,0x12,0x13,0x14,0x15,0x16,0x17"

    # Motor control parameters
    kp_values: "80.0,80.0,20.0,55.0,5.0,5.0,5.0"
    kd_values: "2.75,2.5,0.7,0.4,0.7,0.6,0.5"

    # Gripper configuration
    enable_gripper: true
    gripper_motor_type: "DM4310"
    gripper_send_can_id: "0x08"
    gripper_recv_can_id: "0x18"
    gripper_kp: 0.5
    gripper_kd: 0.1
    gripper_gear_radius: 0.00853
    gripper_gear_direction_multiplier: -1.0

    # Safety parameters
    start_pos_tolerance_rad: 0.1
    pos_jump_tolerance_rad: 0.19634954  # π/16

  right_arm:
    can_interface: "can0"
    use_canfd: false

    # Motor configuration
    motor_types: "DM8009,DM8009,DM4340,DM4340,DM4310,DM4310,DM4310"
    send_can_ids: "0x01,0x02,0x03,0x04,0x05,0x06,0x07"
    recv_can_ids: "0x11,0x12,0x13,0x14,0x15,0x16,0x17"

    # Motor control parameters
    kp_values: "80.0,80.0,20.0,55.0,5.0,5.0,5.0"
    kd_values: "2.75,2.5,0.7,0.4,0.7,0.6,0.5"

    # Gripper configuration
    enable_gripper: false
    gripper_motor_type: "DM4310"
    gripper_send_can_id: "0x08"
    gripper_recv_can_id: "0x18"
    gripper_kp: 0.5
    gripper_kd: 0.1
    gripper_gear_radius: 0.00853
    gripper_gear_direction_multiplier: -1.0

    # Safety parameters
    start_pos_tolerance_rad: 0.1
    pos_jump_tolerance_rad: 0.19634954  # π/16